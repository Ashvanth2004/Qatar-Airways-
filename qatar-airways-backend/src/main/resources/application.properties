# ═══════════════════════════════════════════
# QATAR AIRWAYS — Backend Configuration
# ═══════════════════════════════════════════

# Server
server.port=5000

# MySQL Database (default)
spring.datasource.url=jdbc:mysql://localhost:3306/qatar_airways?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Optional: Switch to PostgreSQL by uncommenting below & commenting MySQL above
# spring.datasource.url=jdbc:postgresql://localhost:5432/qatar_airways
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS (allow React dev server)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175